<!doctype html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SOLO12 BLE Controller</title>

  <style>
    :root {
      --btn-size: 92px;
      --gap: 10px;
    }

    html, body {
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      text-align: center;
      background: #111;
      color: #eee;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
      overscroll-behavior: none;
    }

    body {
      padding: 18px;
    }

    h2 {
      margin: 8px 0 14px;
      font-size: 24px;
    }

    .top-bar, .test-row {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    button {
      border: none;
      border-radius: 16px;
      background: #2f2f2f;
      color: #fff;
      font-size: 22px;
      font-weight: 700;
      padding: 14px 18px;
      min-width: 90px;
      min-height: 64px;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    button:active,
    button.active {
      background: #666;
      transform: scale(0.97);
    }

    .small {
      font-size: 16px;
      min-height: 46px;
      padding: 10px 14px;
      border-radius: 12px;
    }

    .connect {
      background: #1f6f3f;
    }

    .disconnect {
      background: #7a2e2e;
    }

    .stop {
      background: #a73333;
    }

    #status {
      margin: 10px auto;
      font-weight: 700;
      min-height: 24px;
    }

    #tx, #keys, #lastResult, #props {
      font-family: monospace;
      font-size: 15px;
      margin: 4px auto;
      min-height: 22px;
      overflow-wrap: anywhere;
    }

    .manual-box, .log-box {
      margin: 18px auto;
      max-width: 560px;
      padding: 14px;
      border: 1px solid #333;
      border-radius: 16px;
      background: #1a1a1a;
    }

    .manual-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    input, select {
      font-size: 18px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #555;
      background: #0b0b0b;
      color: #fff;
    }

    input {
      flex: 1;
      min-width: 180px;
    }

    .hint {
      font-size: 13px;
      color: #aaa;
      margin-top: 8px;
    }

    #sendLog {
      text-align: left;
      font-family: monospace;
      font-size: 13px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      max-height: 180px;
      overflow-y: auto;
      margin-top: 8px;
      color: #ddd;
    }

    .controller {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 26px;
      margin-top: 22px;
      flex-wrap: wrap;
    }

    .dpad {
      display: grid;
      grid-template-columns: var(--btn-size) var(--btn-size) var(--btn-size);
      grid-template-rows: var(--btn-size) var(--btn-size) var(--btn-size);
      gap: var(--gap);
      justify-content: center;
      align-items: center;
    }

    .dpad button {
      width: var(--btn-size);
      height: var(--btn-size);
      padding: 0;
      font-size: 34px;
    }

    .empty {
      width: var(--btn-size);
      height: var(--btn-size);
    }

    .rotation {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .rotation button {
      width: 115px;
      height: 82px;
      font-size: 34px;
    }

    .label {
      font-size: 13px;
      color: #aaa;
      font-weight: 500;
      margin-top: 4px;
    }

    .button-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      line-height: 1.05;
    }

    code {
      color: #ddd;
    }

    @media (max-width: 480px) {
      :root {
        --btn-size: 82px;
        --gap: 8px;
      }

      .controller {
        gap: 16px;
      }

      .rotation {
        flex-direction: row;
      }

      .rotation button {
        width: 96px;
        height: 76px;
      }
    }
  </style>
</head>

<body>
  <h2>SOLO12 BLE Controller</h2>

  <div class="top-bar">
    <button class="small connect" onclick="connectBle()">Connect</button>
    <button class="small disconnect" onclick="disconnectBle()">Disconnect</button>
    <button class="small stop" onclick="stopRobot()">STOP</button>
  </div>

  <div id="status">Disconnected</div>
  <div id="tx">TX: waiting</div>
  <div id="keys">Keys:</div>
  <div id="lastResult">Last write: none</div>
  <div id="props">RX properties: unknown</div>

  <div class="manual-box">
    <div><b>Manual Binary Send (Comma separated 3 numbers)</b></div>

    <div class="manual-row">
      <input id="manualInput" type="text" placeholder="Example: 0,1,-1">

      <select id="endingSelect">
        <option value="cr" selected>CR \r</option>
        <option value="lf">LF \n</option>
        <option value="crlf">CRLF \r\n</option>
        <option value="none">none</option>
      </select>

      <select id="writeModeSelect">
        <option value="withResponse" selected>Write response</option>
        <option value="withoutResponse">Write no resp</option>
        <option value="legacy">Legacy write</option>
        <option value="auto">Auto</option>
      </select>

      <button class="small" onclick="sendManualBinary()">Send</button>
    </div>

    <div class="test-row">
      <button class="small" onclick="testBinaryCommand(0, 1, 0)">Test forward CR</button>
      <button class="small" onclick="testBinaryCommand(0, 0, 0)">Test stop CR</button>
    </div>

    <div class="hint">
      Les valeurs sont envoyées sous forme d'octets bruts (0 ou 1, ou 255 pour -1) encapsulés dans <code>% ... \r%</code>.
    </div>
  </div>

  <div class="controller">
    <div>
      <div class="dpad">
        <div class="empty"></div>

        <button data-key="z">
          <div class="button-content">
            ↑
            <span class="label">Front</span>
          </div>
        </button>

        <div class="empty"></div>

        <button data-key="q">
          <div class="button-content">
            ←
            <span class="label">Left</span>
          </div>
        </button>

        <button class="stop" onclick="stopRobot()">
          <div class="button-content">
            ■
            <span class="label">Stop</span>
          </div>
        </button>

        <button data-key="d">
          <div class="button-content">
            →
            <span class="label">Right</span>
          </div>
        </button>

        <div class="empty"></div>

        <button data-key="s">
          <div class="button-content">
            ↓
            <span class="label">Back</span>
          </div>
        </button>

        <div class="empty"></div>
      </div>
    </div>

    <div class="rotation">
      <button data-key="a">
        <div class="button-content">
          ↶
          <span class="label">Rot L</span>
        </div>
      </button>

      <button data-key="e">
        <div class="button-content">
          ↷
          <span class="label">Rot R</span>
        </div>
      </button>
    </div>
  </div>

  <div class="log-box">
    <b>Browser send log</b>
    <div id="sendLog">No writes yet.</div>
  </div>

<script>
const DEVICE_NAME = "SOLO12";
const SERVICE_UUID = "49535343-fe7d-4ae5-8fa9-9fafd205e455";
const RX_UUID      = "49535343-8841-43f4-a8d4-ecbe34729bb3";

let device = null;
let rxChar = null;
let activeKeys = new Set();

let sendTimer = null;
let sendQueue = [];
let sending = false;
let writeCount = 0;
let logLines = [];

function axis(neg, pos) {
  if (neg && !pos) return -1;
  if (pos && !neg) return 1;
  return 0;
}

function setStatus(text) {
  document.getElementById("status").textContent = text;
}

// Convertit un Uint8Array en chaîne Hexadécimale lisible pour le débug
function displayBuffer(buffer) {
  return Array.from(buffer).map(b => '0x' + b.toString(16).padStart(2, '0').toUpperCase()).join(' ');
}

function updateKeyDebug() {
  document.getElementById("keys").textContent =
    "Keys: " + Array.from(activeKeys).join(",");
}

function updateTxDebug(buffer) {
  if (typeof buffer === "string") {
    document.getElementById("tx").textContent = "TX: " + buffer;
  } else {
    document.getElementById("tx").textContent = "TX (Hex): " + displayBuffer(buffer);
  }
}

function updateLastResult(text) {
  document.getElementById("lastResult").textContent = "Last write: " + text;
}

function updateProps() {
  if (!rxChar) {
    document.getElementById("props").textContent = "RX properties: unknown";
    return;
  }
  const p = rxChar.properties;
  const text = "write=" + p.write + ", writeWithoutResponse=" + p.writeWithoutResponse + ", notify=" + p.notify + ", read=" + p.read;
  document.getElementById("props").textContent = "RX properties: " + text;
  addLog("RX characteristic properties: " + text);
}

function addLog(text) {
  const stamp = new Date().toLocaleTimeString();
  logLines.unshift(stamp + "  " + text);
  logLines = logLines.slice(0, 24);
  document.getElementById("sendLog").textContent = logLines.join("\n");
}

function startMotionLoop() {
  if (!sendTimer) {
    sendTimer = setInterval(sendMotionCommand, 50);
  }
}

function stopMotionLoop() {
  if (sendTimer) {
    clearInterval(sendTimer);
    sendTimer = null;
  }
}

async function connectBle() {
  try {
    if (!navigator.bluetooth) {
      setStatus("Web Bluetooth unavailable in this browser");
      return;
    }
    setStatus("Scanning...");
    device = await navigator.bluetooth.requestDevice({
      acceptAllDevices: true,
      optionalServices: [SERVICE_UUID]
    });
    device.addEventListener("gattserverdisconnected", onDisconnected);
    setStatus("Connecting...");
    const server = await device.gatt.connect();
    const service = await server.getPrimaryService(SERVICE_UUID);
    rxChar = await service.getCharacteristic(RX_UUID);

    setStatus("Connected to " + (device.name || "BLE device"));
    updateTxDebug("waiting");
    updateLastResult("none");
    updateProps();
    addLog("connected; no data sent");
  } catch (err) {
    setStatus("Error: " + err.message);
    addLog("connect error: " + err.message);
    console.error(err);
  }
}

async function disconnectBle() {
  try {
    activeKeys.clear();
    updateKeyDebug();
    stopMotionLoop();
    if (device && device.gatt && device.gatt.connected) {
      device.gatt.disconnect();
    }
    rxChar = null;
    setStatus("Disconnected");
    updateTxDebug("waiting");
    updateLastResult("none");
    updateProps();
    addLog("disconnected; no data sent");
  } catch (err) {
    console.error("Disconnect failed:", err);
    setStatus("Disconnect error: " + err.message);
    addLog("disconnect error: " + err.message);
  }
}

function onDisconnected() {
  activeKeys.clear();
  updateKeyDebug();
  stopMotionLoop();
  rxChar = null;
  setStatus("Disconnected");
  updateTxDebug("waiting");
  updateLastResult("none");
  updateProps();
  addLog("GATT disconnected");
}

// Génère le Uint8Array final au format : [%][VX][VY][WZ][LineEnding][%]
function buildBinaryMessage(vx, vy, wz, endingType = "cr") {
  // Déterminer la taille des fins de ligne
  let endingBytes = [];
  if (endingType === "cr") endingBytes = [13];       // \r
  if (endingType === "lf") endingBytes = [10];       // \n
  if (endingType === "crlf") endingBytes = [13, 10];  // \r\n

  // Structure : '%' (1 octet) + 3 axes (3 octets) + fin de ligne (0-2 octets) + '%' (1 octet)
  const totalLength = 1 + 3 + endingBytes.length + 1;
  const buffer = new Uint8Array(totalLength);

  let index = 0;
  buffer[index++] = 37; // '%' en ASCII

  // Stockage des valeurs d'axes en octets bruts (0, 1, ou 255 pour -1)
  buffer[index++] = vx & 0xFF;
  buffer[index++] = vy & 0xFF;
  buffer[index++] = wz & 0xFF;

  // Ajout des fins de ligne
  for (let b of endingBytes) {
    buffer[index++] = b;
  }

  buffer[index++] = 37; // '%' en ASCII

  return buffer;
}

function getMotionMessageBuffer() {
  const vx = axis(activeKeys.has("q"), activeKeys.has("d"));
  const vy = axis(activeKeys.has("s"), activeKeys.has("z"));
  const wz = axis(activeKeys.has("a"), activeKeys.has("e"));
  return buildBinaryMessage(vx, vy, wz, "cr");
}

async function sendMotionCommand() {
  if (activeKeys.size === 0) return;
  await sendRawBuffer(getMotionMessageBuffer());
}

async function sendManualBinary() {
  const input = document.getElementById("manualInput");
  const text = input.value.trim();
  if (!text.length) return;

  const parts = text.split(',').map(Number);
  if (parts.length !== 3 || parts.some(isNaN)) {
    alert("Veuillez entrer 3 nombres séparés par des virgules (ex: 0,1,0)");
    return;
  }

  const endingValue = document.getElementById("endingSelect").value;
  const buffer = buildBinaryMessage(parts[0], parts[1], parts[2], endingValue);
  await sendRawBuffer(buffer);
}

async function testBinaryCommand(vx, vy, wz) {
  const buffer = buildBinaryMessage(vx, vy, wz, "cr");
  await sendRawBuffer(buffer);
}

async function stopRobot() {
  activeKeys.clear();
  updateKeyDebug();
  stopMotionLoop();
  await sendRawBuffer(buildBinaryMessage(0, 0, 0, "cr"));
}

async function sendStopAfterRelease() {
  stopMotionLoop();
  await sendRawBuffer(buildBinaryMessage(0, 0, 0, "cr"));
}

async function writeGatt(data) {
  const mode = document.getElementById("writeModeSelect").value;

  if (mode === "withResponse") {
    if (typeof rxChar.writeValueWithResponse === "function") {
      await rxChar.writeValueWithResponse(data);
      return "writeValueWithResponse";
    }
    if (typeof rxChar.writeValue === "function") {
      await rxChar.writeValue(data);
      return "legacy writeValue fallback";
    }
    throw new Error("writeValueWithResponse unavailable");
  }

  if (mode === "withoutResponse") {
    if (typeof rxChar.writeValueWithoutResponse === "function") {
      await rxChar.writeValueWithoutResponse(data);
      return "writeValueWithoutResponse";
    }
    throw new Error("writeValueWithoutResponse unavailable");
  }

  if (mode === "legacy") {
    if (typeof rxChar.writeValue === "function") {
      await rxChar.writeValue(data);
      return "legacy writeValue";
    }
    throw new Error("legacy writeValue unavailable");
  }

  if (rxChar.properties.write && typeof rxChar.writeValueWithResponse === "function") {
    await rxChar.writeValueWithResponse(data);
    return "auto writeValueWithResponse";
  }

  if (rxChar.properties.writeWithoutResponse && typeof rxChar.writeValueWithoutResponse === "function") {
    await rxChar.writeValueWithoutResponse(data);
    return "auto writeValueWithoutResponse";
  }

  if (typeof rxChar.writeValue === "function") {
    await rxChar.writeValue(data);
    return "auto legacy writeValue";
  }

  throw new Error("No supported GATT write method");
}

// Reçoit un Uint8Array au lieu d'une chaîne ASCII
async function sendRawBuffer(buffer) {
  if (!rxChar) {
    setStatus("Not connected");
    updateLastResult("not connected");
    addLog("not sent: not connected");
    return;
  }

  updateTxDebug(buffer);
  sendQueue.push(buffer);

  if (sending) return;
  sending = true;

  try {
    while (sendQueue.length > 0) {
      const currentBuffer = sendQueue.shift();
      const mode = await writeGatt(currentBuffer);
      writeCount += 1;

      const okText = "#" + writeCount + " OK via " + mode + ": [" + displayBuffer(currentBuffer) + "]";
      updateLastResult(okText);
      addLog("sent " + okText);
    }
  } catch (err) {
    console.error("Write failed:", err);
    setStatus("Write error: " + err.message);
    updateLastResult("ERROR: " + err.message);
    addLog("write error: " + err.message);
  } finally {
    sending = false;
  }
}

// Setup des événements pointeurs (inchangé)
for (const btn of document.querySelectorAll("[data-key]")) {
  const key = btn.dataset.key;

  btn.addEventListener("pointerdown", async e => {
    e.preventDefault();
    try { btn.setPointerCapture(e.pointerId); } catch (_) {}
    btn.classList.add("active");
    activeKeys.add(key);
    updateKeyDebug();
    startMotionLoop();
    await sendRawBuffer(getMotionMessageBuffer());
  });

  btn.addEventListener("pointerup", async e => {
    e.preventDefault();
    btn.classList.remove("active");
    activeKeys.delete(key);
    updateKeyDebug();
    if (activeKeys.size === 0) {
      await sendStopAfterRelease();
    } else {
      await sendRawBuffer(getMotionMessageBuffer());
    }
  });

  btn.addEventListener("pointercancel", async e => {
    e.preventDefault();
    btn.classList.remove("active");
    activeKeys.delete(key);
    updateKeyDebug();
    if (activeKeys.size === 0) {
      await sendStopAfterRelease();
    } else {
      await sendRawBuffer(getMotionMessageBuffer());
    }
  });

  btn.addEventListener("lostpointercapture", async () => {
    btn.classList.remove("active");
    activeKeys.delete(key);
    updateKeyDebug();
    if (activeKeys.size === 0) {
      await sendStopAfterRelease();
    } else {
      await sendRawBuffer(getMotionMessageBuffer());
    }
  });
}

window.addEventListener("keydown", e => {
  const k = e.key.toLowerCase();
  if ("zsqdae".includes(k)) {
    activeKeys.add(k);
    updateKeyDebug();
    startMotionLoop();
    sendRawBuffer(getMotionMessageBuffer());
  }
});

window.addEventListener("keyup", e => {
  const k = e.key.toLowerCase();
  if ("zsqdae".includes(k)) {
    activeKeys.delete(k);
    updateKeyDebug();
    if (activeKeys.size === 0) {
      sendStopAfterRelease();
    } else {
      sendRawBuffer(getMotionMessageBuffer());
    }
  }
});

document.getElementById("manualInput").addEventListener("keydown", e => {
  if (e.key === "Enter") {
    sendManualBinary();
  }
});
</script>
</body>
</html>
