<!doctype html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SOLO12 BLE Controller</title>

  <style>
    :root {
      --btn-size: 92px;
      --gap: 10px;
    }

    html, body {
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      text-align: center;
      background: #111;
      color: #eee;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
      overscroll-behavior: none;
    }

    body {
      padding: 18px;
    }

    h2 {
      margin: 8px 0 14px;
      font-size: 24px;
    }

    .top-bar {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    button {
      border: none;
      border-radius: 16px;
      background: #2f2f2f;
      color: #fff;
      font-size: 22px;
      font-weight: 700;
      padding: 14px 18px;
      min-width: 90px;
      min-height: 64px;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    button:active,
    button.active {
      background: #666;
      transform: scale(0.97);
    }

    .small {
      font-size: 16px;
      min-height: 46px;
      padding: 10px 14px;
      border-radius: 12px;
    }

    .connect {
      background: #1f6f3f;
    }

    .disconnect {
      background: #7a2e2e;
    }

    .stop {
      background: #a73333;
    }

    #status {
      margin: 10px auto;
      font-weight: 700;
      min-height: 24px;
    }

    #tx, #keys, #lastResult {
      font-family: monospace;
      font-size: 15px;
      margin: 4px auto;
      min-height: 22px;
      overflow-wrap: anywhere;
    }

    .manual-box, .log-box {
      margin: 18px auto;
      max-width: 520px;
      padding: 14px;
      border: 1px solid #333;
      border-radius: 16px;
      background: #1a1a1a;
    }

    .manual-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    input, select {
      font-size: 18px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #555;
      background: #0b0b0b;
      color: #fff;
    }

    input {
      flex: 1;
      min-width: 0;
    }

    select {
      max-width: 120px;
    }

    .hint {
      font-size: 13px;
      color: #aaa;
      margin-top: 8px;
    }

    #sendLog {
      text-align: left;
      font-family: monospace;
      font-size: 13px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      max-height: 150px;
      overflow-y: auto;
      margin-top: 8px;
      color: #ddd;
    }

    .test-row {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .controller {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 26px;
      margin-top: 22px;
      flex-wrap: wrap;
    }

    .dpad {
      display: grid;
      grid-template-columns: var(--btn-size) var(--btn-size) var(--btn-size);
      grid-template-rows: var(--btn-size) var(--btn-size) var(--btn-size);
      gap: var(--gap);
      justify-content: center;
      align-items: center;
    }

    .dpad button {
      width: var(--btn-size);
      height: var(--btn-size);
      padding: 0;
      font-size: 34px;
    }

    .empty {
      width: var(--btn-size);
      height: var(--btn-size);
    }

    .rotation {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .rotation button {
      width: 115px;
      height: 82px;
      font-size: 34px;
    }

    .label {
      font-size: 13px;
      color: #aaa;
      font-weight: 500;
      margin-top: 4px;
    }

    .button-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      line-height: 1.05;
    }

    @media (max-width: 480px) {
      :root {
        --btn-size: 82px;
        --gap: 8px;
      }

      .controller {
        gap: 16px;
      }

      .rotation {
        flex-direction: row;
      }

      .rotation button {
        width: 96px;
        height: 76px;
      }

      .manual-row {
        flex-wrap: wrap;
      }

      input {
        flex-basis: 100%;
      }
    }
  </style>
</head>

<body>
  <h2>SOLO12 BLE Controller</h2>

  <div class="top-bar">
    <button class="small connect" onclick="connectBle()">Connect</button>
    <button class="small disconnect" onclick="disconnectBle()">Disconnect</button>
    <button class="small stop" onclick="stopRobot()">STOP</button>
  </div>

  <div id="status">Disconnected</div>
  <div id="tx">TX: waiting</div>
  <div id="keys">Keys:</div>
  <div id="lastResult">Last write: none</div>

  <div class="manual-box">
    <div><b>Manual ASCII send</b></div>

    <div class="manual-row">
      <input id="manualInput" type="text" placeholder="Example: 0,1,0">
      <select id="endingSelect">
        <option value="cr" selected>CR \r</option>
        <option value="lf">LF \n</option>
        <option value="crlf">CRLF \r\n</option>
        <option value="none">none</option>
      </select>
      <button class="small" onclick="sendManualAscii()">Send</button>
    </div>

    <div class="test-row">
      <button class="small" onclick="sendRawAscii('0,1,0\r')">Test forward CR</button>
      <button class="small" onclick="sendRawAscii('0,0,0\r')">Test stop CR</button>
      <button class="small" onclick="sendRawAscii('PING\r')">Test PING CR</button>
    </div>

    <div class="hint">
      For the robot protocol use CR <code>\r</code>. Use CRLF only for serial-terminal display debugging.
    </div>
  </div>

  <div class="controller">
    <div>
      <div class="dpad">
        <div class="empty"></div>

        <button data-key="z">
          <div class="button-content">
            ↑
            <span class="label">Front</span>
          </div>
        </button>

        <div class="empty"></div>

        <button data-key="q">
          <div class="button-content">
            ←
            <span class="label">Left</span>
          </div>
        </button>

        <button class="stop" onclick="stopRobot()">
          <div class="button-content">
            ■
            <span class="label">Stop</span>
          </div>
        </button>

        <button data-key="d">
          <div class="button-content">
            →
            <span class="label">Right</span>
          </div>
        </button>

        <div class="empty"></div>

        <button data-key="s">
          <div class="button-content">
            ↓
            <span class="label">Back</span>
          </div>
        </button>

        <div class="empty"></div>
      </div>
    </div>

    <div class="rotation">
      <button data-key="a">
        <div class="button-content">
          ↶
          <span class="label">Rot L</span>
        </div>
      </button>

      <button data-key="e">
        <div class="button-content">
          ↷
          <span class="label">Rot R</span>
        </div>
      </button>
    </div>
  </div>

  <div class="log-box">
    <b>Browser send log</b>
    <div id="sendLog">No writes yet.</div>
  </div>

<script>
const DEVICE_NAME = "SOLO12";

const SERVICE_UUID = "49535343-fe7d-4ae5-8fa9-9fafd205e455";
const RX_UUID      = "49535343-8841-43f4-a8d4-ecbe34729bb3";

let device = null;
let rxChar = null;
let activeKeys = new Set();

let sendTimer = null;
let sendQueue = [];
let sending = false;
let writeCount = 0;
let logLines = [];

function axis(neg, pos) {
  if (neg && !pos) return -1;
  if (pos && !neg) return 1;
  return 0;
}

function setStatus(text) {
  document.getElementById("status").textContent = text;
}

function displayText(s) {
  return s.replace(/\r/g, "\\r").replace(/\n/g, "\\n");
}

function updateKeyDebug() {
  document.getElementById("keys").textContent =
    "Keys: " + Array.from(activeKeys).join(",");
}

function updateTxDebug(msg) {
  document.getElementById("tx").textContent = "TX: " + displayText(msg);
}

function updateLastResult(text) {
  document.getElementById("lastResult").textContent = "Last write: " + text;
}

function addLog(text) {
  const stamp = new Date().toLocaleTimeString();
  logLines.unshift(stamp + "  " + text);
  logLines = logLines.slice(0, 20);
  document.getElementById("sendLog").textContent = logLines.join("\n");
}

function startMotionLoop() {
  if (!sendTimer) {
    sendTimer = setInterval(sendMotionCommand, 50); // 20 Hz while held
  }
}

function stopMotionLoop() {
  if (sendTimer) {
    clearInterval(sendTimer);
    sendTimer = null;
  }
}

async function connectBle() {
  try {
    if (!navigator.bluetooth) {
      setStatus("Web Bluetooth unavailable in this browser");
      return;
    }

    setStatus("Scanning...");

    device = await navigator.bluetooth.requestDevice({
      acceptAllDevices: true,
      optionalServices: [SERVICE_UUID]
    });

    device.addEventListener("gattserverdisconnected", onDisconnected);

    setStatus("Connecting...");
    const server = await device.gatt.connect();

    const service = await server.getPrimaryService(SERVICE_UUID);
    rxChar = await service.getCharacteristic(RX_UUID);

    // Important: send nothing on connection.
    setStatus("Connected to " + (device.name || "BLE device"));
    updateTxDebug("waiting");
    updateLastResult("none");
    addLog("connected; no data sent");

  } catch (err) {
    setStatus("Error: " + err.message);
    addLog("connect error: " + err.message);
    console.error(err);
  }
}

async function disconnectBle() {
  try {
    // Important: disconnect sends no BLE command automatically.
    activeKeys.clear();
    updateKeyDebug();
    stopMotionLoop();

    if (device && device.gatt && device.gatt.connected) {
      device.gatt.disconnect();
    }

    rxChar = null;
    setStatus("Disconnected");
    updateTxDebug("waiting");
    updateLastResult("none");
    addLog("disconnected; no data sent");

  } catch (err) {
    console.error("Disconnect failed:", err);
    setStatus("Disconnect error: " + err.message);
    addLog("disconnect error: " + err.message);
  }
}

function onDisconnected() {
  activeKeys.clear();
  updateKeyDebug();
  stopMotionLoop();

  rxChar = null;
  setStatus("Disconnected");
  updateTxDebug("waiting");
  updateLastResult("none");
  addLog("GATT disconnected");
}

function getMotionMessage() {
  const vx = axis(activeKeys.has("q"), activeKeys.has("d"));
  const vy = axis(activeKeys.has("s"), activeKeys.has("z"));
  const wz = axis(activeKeys.has("a"), activeKeys.has("e"));

  return `${vx},${vy},${wz}\r`;
}

async function sendMotionCommand() {
  if (activeKeys.size === 0) {
    return;
  }

  await sendRawAscii(getMotionMessage());
}

function lineEnding() {
  const value = document.getElementById("endingSelect").value;

  if (value === "cr") return "\r";
  if (value === "lf") return "\n";
  if (value === "crlf") return "\r\n";
  return "";
}

async function sendManualAscii() {
  const input = document.getElementById("manualInput");
  let text = input.value;

  if (!text.length) {
    return;
  }

  // Remove accidental line endings from the text box, then append the selected ending.
  text = text.replace(/[\r\n]+$/g, "");
  await sendRawAscii(text + lineEnding());
}

async function stopRobot() {
  activeKeys.clear();
  updateKeyDebug();
  stopMotionLoop();
  await sendRawAscii("0,0,0\r");
}

async function sendStopAfterRelease() {
  stopMotionLoop();
  await sendRawAscii("0,0,0\r");
}

async function writeGatt(data) {
  // Brave/Chrome versions differ. Try modern methods first, then legacy writeValue.
  if (rxChar.properties.writeWithoutResponse && typeof rxChar.writeValueWithoutResponse === "function") {
    await rxChar.writeValueWithoutResponse(data);
    return "writeWithoutResponse";
  }

  if (rxChar.properties.write && typeof rxChar.writeValueWithResponse === "function") {
    await rxChar.writeValueWithResponse(data);
    return "writeWithResponse";
  }

  if (typeof rxChar.writeValue === "function") {
    await rxChar.writeValue(data);
    return "legacy writeValue";
  }

  throw new Error("No supported GATT write method on this browser");
}

async function sendRawAscii(msg) {
  if (!rxChar) {
    setStatus("Not connected");
    updateLastResult("not connected");
    addLog("not sent: not connected");
    return;
  }

  updateTxDebug(msg);

  // Keep latest motion packet only, but always enqueue manual/test/stop writes.
  sendQueue.push(msg);

  if (sending) {
    return;
  }

  sending = true;

  try {
    while (sendQueue.length > 0) {
      const currentMsg = sendQueue.shift();
      const data = new TextEncoder().encode(currentMsg);

      const mode = await writeGatt(data);
      writeCount += 1;

      const okText = "#" + writeCount + " OK via " + mode + ": " + displayText(currentMsg);
      updateLastResult(okText);
      addLog("sent " + okText);
    }
  } catch (err) {
    console.error("Write failed:", err);
    setStatus("Write error: " + err.message);
    updateLastResult("ERROR: " + err.message);
    addLog("write error: " + err.message);
  } finally {
    sending = false;
  }
}

/*
  Phone controls:
  - Connection sends nothing.
  - Press and hold a direction/rotation button to stream at 20 Hz.
  - Releasing the last active button sends one stop command: 0,0,0\r.
*/
for (const btn of document.querySelectorAll("[data-key]")) {
  const key = btn.dataset.key;

  btn.addEventListener("pointerdown", async e => {
    e.preventDefault();

    try {
      btn.setPointerCapture(e.pointerId);
    } catch (_) {}

    btn.classList.add("active");
    activeKeys.add(key);
    updateKeyDebug();

    startMotionLoop();
    await sendRawAscii(getMotionMessage());
  });

  btn.addEventListener("pointerup", async e => {
    e.preventDefault();

    btn.classList.remove("active");
    activeKeys.delete(key);
    updateKeyDebug();

    if (activeKeys.size === 0) {
      await sendStopAfterRelease();
    } else {
      await sendRawAscii(getMotionMessage());
    }
  });

  btn.addEventListener("pointercancel", async e => {
    e.preventDefault();

    btn.classList.remove("active");
    activeKeys.delete(key);
    updateKeyDebug();

    if (activeKeys.size === 0) {
      await sendStopAfterRelease();
    } else {
      await sendRawAscii(getMotionMessage());
    }
  });

  btn.addEventListener("lostpointercapture", async () => {
    btn.classList.remove("active");
    activeKeys.delete(key);
    updateKeyDebug();

    if (activeKeys.size === 0) {
      await sendStopAfterRelease();
    } else {
      await sendRawAscii(getMotionMessage());
    }
  });
}

// Optional keyboard control for testing from a computer.
window.addEventListener("keydown", e => {
  const k = e.key.toLowerCase();

  if ("zsqdae".includes(k)) {
    activeKeys.add(k);
    updateKeyDebug();

    startMotionLoop();
    sendRawAscii(getMotionMessage());
  }
});

window.addEventListener("keyup", e => {
  const k = e.key.toLowerCase();

  if ("zsqdae".includes(k)) {
    activeKeys.delete(k);
    updateKeyDebug();

    if (activeKeys.size === 0) {
      sendStopAfterRelease();
    } else {
      sendRawAscii(getMotionMessage());
    }
  }
});

// Send manual command when pressing Enter.
document.getElementById("manualInput").addEventListener("keydown", e => {
  if (e.key === "Enter") {
    sendManualAscii();
  }
});
</script>
</body>
</html>
